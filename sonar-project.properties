sonar.projectName=LMS Backend (Flask)

# Source and test locations (relative to this file)
sonar.sources=.
sonar.tests=tests

# Exclusions
sonar.exclusions=**/tests/**,**/coverage/**,**/__pycache__/**,**/.git/**

# Test patterns
sonar.test.inclusions=**/test_*.py

# Coverage
sonar.python.coverage.reportPaths=coverage.xml

# Encoding & language
sonar.sourceEncoding=UTF-8
sonar.python.version=3.10
